<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f766e"><title>Perfil profissional | OrçaZap</title>
  <style>:root{font-family:Arial,Helvetica,sans-serif;color:#153431;background:#f4fbfc}*{box-sizing:border-box}body{margin:0;padding:16px}main{max-width:720px;margin:auto}.hero{padding:24px;border-radius:24px;background:linear-gradient(135deg,#0f766e,#9edfec);color:white}.card{background:white;border:1px solid #d7eaed;border-radius:18px;padding:18px;margin-top:14px}.rating{font-size:20px;font-weight:900;color:#0f766e}.button{display:block;text-align:center;text-decoration:none;padding:14px;border-radius:12px;background:#0f766e;color:white;font-weight:900;margin-top:12px}.links a{display:block;margin-top:9px;color:#0f766e}.small{opacity:.8}</style>
</head>
<body><main><section id="hero" class="hero"><h1>Carregando perfil...</h1></section><section id="content"></section></main>
<script src="config.js"></script><script>
const cfg=window.ORCAZAP_BACKEND||{};const slug=new URLSearchParams(location.search).get('p')||'';const hero=document.getElementById('hero');const content=document.getElementById('content');function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('\"','&quot;')}function safeUrl(v){try{const u=new URL(String(v||''),location.href);return ['http:','https:'].includes(u.protocol)?u.href:''}catch(_){return ''}}
async function rpc(name,body){const b=String(cfg.supabaseUrl||'').replace(/\/+$/,'');const r=await fetch(`${b}/rest/v1/rpc/${name}`,{method:'POST',headers:{apikey:cfg.supabaseAnonKey,Authorization:`Bearer ${cfg.supabaseAnonKey}`,'Content-Type':'application/json'},body:JSON.stringify(body)});const raw=await r.text();let d=null;if(raw.trim()){try{d=JSON.parse(raw)}catch(_){d=raw}}if(!r.ok)throw new Error(d?.message||'Não foi possível carregar.');return d}
async function load(){try{const rows=await rpc('orcazap_get_public_professional',{p_slug:slug});if(!Array.isArray(rows)||!rows.length)throw new Error('Profissional não encontrado.');const p=rows[0];const count=Number(p.rating_count||0);const avg=Number(p.rating_average||0);hero.innerHTML=`<h1>${esc(p.display_name)}</h1><p>${esc([p.profession,p.city].filter(Boolean).join(' • '))}</p>`;content.innerHTML=`<div class="card"><div class="rating">${count?`★ ${avg.toFixed(1)} • ${count} avaliação(ões) verificada(s)`:'Novo perfil no OrçaZap'}</div><p class="small">Avaliações são liberadas apenas após serviços concluídos pelo marketplace.</p><a class="button" href="index.html?p=${encodeURIComponent(p.slug)}">Solicitar orçamento</a><div class="links">${safeUrl(p.instagram)?`<a href="${esc(safeUrl(p.instagram))}" target="_blank" rel="noopener">Instagram</a>`:''}${safeUrl(p.facebook)?`<a href="${esc(safeUrl(p.facebook))}" target="_blank" rel="noopener">Facebook</a>`:''}${safeUrl(p.tiktok)?`<a href="${esc(safeUrl(p.tiktok))}" target="_blank" rel="noopener">TikTok</a>`:''}${safeUrl(p.website)?`<a href="${esc(safeUrl(p.website))}" target="_blank" rel="noopener">Site</a>`:''}</div></div>`}catch(e){hero.innerHTML='<h1>Perfil indisponível</h1>';content.innerHTML=`<div class="card">${esc(e.message)}</div>`}}load();
</script></body></html>
